<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Green Earth</title>
<link rel="shortcut icon" href="./assets/hero-leaf1.png" type="image/x-icon">

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="./style.css">
</head>
<body>
  

  <main class="container mx-auto ">
    <h2 class=" text-[#4ade80] font-bold text-4xl text-center">Choose Your Trees</h2>

    <div class="grid grid-cols-12 gap-8">

      <!-- CATEGORIES -->
<div class="bg-white card card-body shadow-2xl col-span-3">
         <h2 class="font-bold text-2xl">Categories</h2>
         <div>
          <button class="btn btn-success w-full" id="allTressBtn">All Tress</button>
          
          <!-- CATEGORIES CONTAINER -->
         <div id="categoriesContainer" class="space-y-3"></div>
     <!-- categories will dynamically be loaded here by js -->

        </div>
      </div>

      <!-- TRESS -->
<div class="bg-white card card-body shadow-2xl col-span-6">
    <div id="tressContainer" class="grid grid-cols-1 sm:grid-cols-3 gap-6 ">

      <div class="card bg-white shadow-sm">
       <figure>
      <img
      src="https://img.daisyui.com/images/stock/photo-1606107557195-0e29a4b5b4aa.webp"
      alt="Shoes" />
     </figure>
       <div class="card-body">
    <h2 class="card-title">Card Title</h2>
    <p class="line-clamp-2">A card component has a figure, a body part, and inside body there are title and actions parts</p>
     <div class="badge badge-success">Success</div>

    <div class="flex justify-between items-center gap-5">
      <h2 class="font-bold text-xl text-[#4ade80]">
        $5000
      </h2>
      <button class="btn btn-primary">Buy Now</button></div>

        </div>
       </div>
    </div>
 

    <div id="loadSpinner" class="h-[60vh]  justify-center items-center hidden">

     <span class="loading loading-dots loading-xs">
     </span>
     
    </div>

</div>


  <!-- Cart -->
   <div class="bg-white card card-body shadow-2xl  col-span-3">
    Cart
   </div>

    </div>

  </main>




















<script src="./script.js"></script>
</body>
</html>
